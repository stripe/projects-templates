guided:
  category: one_time_payment
  framework: nextjs
template: stripe/nextjs-one-time-payment
variant: coral-reef
default: false
variant_description: Netlify • Render Postgres • Clerk • Mixpanel
install_command: npm install
ref: 84315765f28e9ad2d0b3c7167447edf6f65bcebe
repo: https://github.com/stripe/projects-templates/tree/main/nextjs_one_time_payment_coral-reef
metadata:
  description: One-time payment app with Clerk auth, Render Postgres, Netlify hosting, and Mixpanel analytics
  name: Next.js One-time Payment Render Netlify Starter
  owner: stripe
services:
  - netlify/project
  - clerk/auth
  - render/postgres
  - mixpanel/analytics
next_steps:
  - label: Set up Stripe products
    command: npm run setup:stripe
  - label: Run locally
    command: npm run dev
  - label: Build product with Codex
    command: codex "Help me turn this into a real product. Follow prompts/starter-to-product.md."
  - label: Build product with Claude
    command: claude "Help me turn this into a real product. Follow prompts/starter-to-product.md."
  - label: Deploy
    command: npm run deploy
tier_plans:
  clerk/auth:
    free_lowest_cost: Clerk/hobby
    starter_paid: Clerk/pro
    higher_scale: Clerk/pro
  render/postgres:
    free_lowest_cost:
      instance_type: free
    starter_paid:
      instance_type: basic-256mb
    higher_scale:
      instance_type: basic-4gb
  mixpanel/analytics:
    free_lowest_cost: Mixpanel/free
    starter_paid: Mixpanel/growth
    higher_scale: Mixpanel/growth

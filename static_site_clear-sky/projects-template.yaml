guided:
  category: static_site
  framework: nextjs
template: stripe/static-site
variant: clear-sky
default: true
variant_description: Vercel
install_command: npm install
ref: 84315765f28e9ad2d0b3c7167447edf6f65bcebe
repo: https://github.com/stripe/projects-templates/tree/main/static_site_clear-sky
metadata:
  description: Static site starter with a polished landing page and Vercel hosting
  name: Static Site Vercel Starter
  owner: stripe
services:
  - vercel/project
  - posthog/analytics
next_steps:
  - label: Run locally
    command: npm run dev
  - label: Build product with Codex
    command: codex "Help me turn this into a real product. Follow prompts/starter-to-product.md."
  - label: Build product with Claude
    command: claude "Help me turn this into a real product. Follow prompts/starter-to-product.md."
  - label: Deploy
    command: npm run deploy
tier_plans:
  vercel/project:
    free_lowest_cost: Vercel/hobby
    starter_paid: Vercel/pro
    higher_scale: Vercel/pro
  posthog/analytics:
    free_lowest_cost:
      plan_service: PostHog/free
      provider_configuration:
        region: US
    starter_paid:
      plan_service: PostHog/pay_as_you_go
      provider_configuration:
        region: US
    higher_scale:
      plan_service: PostHog/pay_as_you_go
      provider_configuration:
        region: US

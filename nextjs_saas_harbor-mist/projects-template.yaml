guided:
  category: saas
  framework: nextjs
template: stripe/nextjs-saas
variant: harbor-mist
default: false
variant_description: Netlify • Render Postgres • Clerk
install_command: npm install
ref: 84315765f28e9ad2d0b3c7167447edf6f65bcebe
repo: https://github.com/stripe/projects-templates/tree/main/nextjs_saas_harbor-mist
metadata:
  description: Subscription SaaS with Clerk auth, Render Postgres, and Netlify hosting
  name: Next.js SaaS Render Netlify Starter
  owner: stripe
services:
  - netlify/project
  - clerk/auth
  - render/postgres
  - posthog/analytics
next_steps:
  - label: Set up Stripe products
    command: npm run setup:stripe
  - label: Run locally
    command: npm run dev
  - label: Build product with Codex
    command: codex "Help me turn this into a real product. Follow prompts/starter-to-product.md."
  - label: Build product with Claude
    command: claude "Help me turn this into a real product. Follow prompts/starter-to-product.md."
  - label: Deploy
    command: npm run deploy
tier_plans:
  clerk/auth:
    free_lowest_cost: Clerk/hobby
    starter_paid: Clerk/pro
    higher_scale: Clerk/pro
  render/postgres:
    free_lowest_cost:
      instance_type: free
    starter_paid:
      instance_type: basic-256mb
    higher_scale:
      instance_type: basic-4gb
  posthog/analytics:
    free_lowest_cost:
      plan_service: PostHog/free
      provider_configuration:
        region: US
    starter_paid:
      plan_service: PostHog/pay_as_you_go
      provider_configuration:
        region: US
    higher_scale:
      plan_service: PostHog/pay_as_you_go
      provider_configuration:
        region: US
